<!DOCTYPE html>
<html>
<head>
    <title>GGD-SO101 Streamer</title>
    <style>
        body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; font-family: sans-serif; }
        #webcam { display: none; }
    </style>
</head>
<body>
    <h2>Live Camera Stream (Publishing to /human/camera/compressed)</h2> 
    <video id="video" width="640" height="480" autoplay></video> 
    <canvas id="canvas" width="640" height="480" style="display:none;"></canvas> 
	<script> 
    const video = document.getElementById('video'); 
    const canvas = document.getElementById('canvas'); 
    const ctx = canvas.getContext('2d'); 
    const ws = new WebSocket('ws://localhost:8080/ws'); 

    navigator.mediaDevices.getUserMedia({ video: true }) 
        .then(stream => { video.srcObject = stream; }) 
        .catch(err => console.error("Camera access denied!", err)); 

    const QUALITY = 0.7; 
    // Hardcoded 30ms to account for ~3.5ms context-switching overhead, target 30fps
    const MILLISECONDS = 30; 

    ws.onopen = () => { 
        setInterval(() => { 
            if (ws.readyState === WebSocket.OPEN && ws.bufferedAmount === 0) { 
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height); 
                canvas.toBlob((blob) => { 
                    if (blob) ws.send(blob); 
                }, 'image/jpeg', QUALITY); 
            }
        }, MILLISECONDS); 
    }; 
</script>
</body>
</html>
