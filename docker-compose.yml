networks:
  shared_autonomy_net:
    driver: bridge

services:
  web_input_bridge:
    build: 
      context: ./src/web_bridge
    ports:
      - "8080:8080"
    networks:
      - shared_autonomy_net
    volumes:
      - ./src/web_bridge:/app

  perception_processor:
    build: 
      context: ./src/perception
    networks:
      - shared_autonomy_net
    volumes:
      - ./src/perception:/ros2_ws/src/perception
    depends_on:
      - web_input_bridge

  simulation_control:
    platform: linux/amd64    
    build: 
      context: ./src/simulation
    ports:
      - "1234:1234"
      - "5001:5000"
    networks:
      - shared_autonomy_net
    volumes:
      - ./src/simulation:/ros2_ws/src/simulation
    # CRITICAL: Required for 3D software rendering (Webots + Xvfb)
    shm_size: '2gb' 

  triage_supervisor:
    build: 
      context: ./src/triage
    networks:
      - shared_autonomy_net
    volumes:
      - ./src/triage:/ros2_ws/src/triage
    depends_on:
      - simulation_control
